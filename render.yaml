services:
  - type: web
    name: stellar-portfolio
    env: python
    plan: free
    region: oregon
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn myportfolio.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stellar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        generateValue: true
    healthCheckPath: /health/

databases:
  - name: stellar-db
    plan: free
    databaseName: stellardb
    user: stellaruser